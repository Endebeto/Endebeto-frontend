# prebuild writes public/_redirects (API proxy when SPA_PROXY_API_ORIGIN or NETLIFY_API_ORIGIN is set).
# Do not commit public/_redirects.

[build]
  command = "npm run build"
  publish = "dist"

# Synthetic HTML + Open Graph for link-preview crawlers (see netlify/edge-functions/experience-link-preview.ts).
# Path is declared once here only (avoid duplicating export const config in the function body).
[[edge_functions]]
  path = "/experiences/*"
  function = "experience-link-preview"
